<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Israeli_virus.exe</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: 1;
      transition: filter 0.3s ease;
    }

    .blurred {
      filter: blur(8px);
    }

    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: black;
      color: red;
      padding: 30px;
      border: 3px solid red;
      text-align: center;
      z-index: 9999;
      display: none;
      box-shadow: 0 0 20px red;
    }

    .flash {
      font-size: 24px;
      font-weight: bold;
      animation: flash 0.8s infinite;
    }

    @keyframes flash {
      0% { color: red; }
      50% { color: yellow; }
      100% { color: red; }
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background: red;
      color: white;
      border: none;
    }

    button:hover {
      background: darkred;
    }

    /* 🔥 MAP WINDOW */
    #mapWindow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 300px;
      display: none;
      z-index: 10000;
      padding: 6px;
      border-radius: 10px;

      background: linear-gradient(45deg, red, darkred, red);
      background-size: 400% 400%;
      animation: borderFlash 1s infinite;
      box-shadow: 0 0 25px red;

      overflow: hidden;
    }

    @keyframes borderFlash {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #mapInner {
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #mapInner iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- 🎬 VIDEO -->
  <iframe 
    id="video"
    src="https://www.youtube.com/embed/lqm9wUr8LEk?autoplay=1&mute=1&loop=1&playlist=lqm9wUr8LEk&controls=0&rel=0"
    allow="autoplay; fullscreen">
  </iframe>
  
  <!-- ⚠️ POPUP -->
  <div id="popup">
    <div class="flash">
      ⚠ UWAGA ⚠<br>
      TWOJE URZĄDZENIE ZOSTAŁO WYBRANE DO KONTROLI!!
    </div>
    <button onclick="closePopup()">KONTYNUUJ</button>
  </div>

  <!-- 🗺️ MAP -->
  <div id="mapWindow">
    <div id="mapInner"></div>
  </div>

  <!-- 🔊 SOUND -->
  <audio id="alarm" loop>
    <source src="https://www.soundjay.com/misc/sounds/alarm-clock-01.mp3">
  </audio>

  <script>
    const popup = document.getElementById("popup");
    const video = document.getElementById("video");
    const alarm = document.getElementById("alarm");
    const mapWindow = document.getElementById("mapWindow");
    const mapInner = document.getElementById("mapInner");

    function showPopup() {
      popup.style.display = "block";
      video.classList.add("blurred");
      alarm.play().catch(() => {});
    }

    function closePopup() {
      popup.style.display = "none";
      video.classList.remove("blurred");

      alarm.pause();
      alarm.currentTime = 0;

      getLocation();
    }

    function getLocation() {
      if (!navigator.geolocation) {
        showError("Brak geolokalizacji");
        return;
      }

      mapWindow.style.display = "block";
      mapInner.innerHTML = "<div style='color:red;padding:10px;'>NAMIERZANIE...</div>";

      navigator.geolocation.getCurrentPosition(showMap, () => {
        showError("ODRZUCONO DOSTĘP");
      });
    }

    function showMap(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      mapInner.innerHTML = `
        <iframe src="https://maps.google.com/maps?q=${lat},${lon}&z=15&output=embed"></iframe>
      `;
    }

    function showError(msg) {
      mapInner.innerHTML = `<div style="color:red;padding:10px;">${msg}</div>`;
    }

    /* 🔥 Hide map on any click (feels like returning to video) */
    document.addEventListener("click", () => {
      if (mapWindow.style.display === "block") {
        mapWindow.style.display = "none";
      }
    });

    /* 🚀 Reliable popup trigger */
    window.addEventListener("load", () => {
      setTimeout(showPopup, 100);
    });
  </script>

</body>
</html>
